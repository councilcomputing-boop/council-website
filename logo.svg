<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="16" fill="#000080"/>
  <!-- Monitor body -->
  <rect x="14" y="12" width="100" height="76" rx="6" fill="#c8c4bc"/>
  <rect x="14" y="12" width="100" height="3" fill="#ffffff"/>
  <rect x="14" y="12" width="3" height="76" fill="#ffffff"/>
  <rect x="108" y="15" width="6" height="73" fill="#808080"/>
  <rect x="17" y="85" width="97" height="3" fill="#808080"/>
  <!-- Screen -->
  <rect x="22" y="20" width="84" height="60" rx="3" fill="#001800"/>
  <!-- Terminal text -->
  <text x="28" y="42" font-family="Courier New, monospace" font-size="14" fill="#00ee66" font-weight="bold">COUNCIL</text>
  <text x="28" y="58" font-family="Courier New, monospace" font-size="12" fill="#00cc55">COMPUTING</text>
  <text x="28" y="72" font-family="Courier New, monospace" font-size="11" fill="#008833">&gt; run_</text>
  <!-- Screen shine -->
