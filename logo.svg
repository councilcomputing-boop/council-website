  <rect x="52" y="88" width="24" height="12" fill="#b8b4ac"/>
  <!-- Base -->
  <rect x="32" y="100" width="64" height="12" rx="4" fill="#c8c4bc"/>
  <rect x="32" y="100" width="64" height="3" fill="#ffffff"/>
  <rect x="32" y="100" width="2" height="12" fill="#ffffff"/>
</svg>
